name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Inject Secrets into HTML
        run: |
          # あなたのリポジトリのファイル名 'index.html' に合わせて置換を実行します
          sed -i "s/REPLACE_WITH_FIREBASE_API_KEY/${{ secrets.FIREBASE_API_KEY }}/g" index.html
          sed -i "s/REPLACE_WITH_FIREBASE_AUTH_DOMAIN/${{ secrets.FIREBASE_AUTH_DOMAIN }}/g" index.html
          sed -i "s/REPLACE_WITH_FIREBASE_PROJECT_ID/${{ secrets.FIREBASE_PROJECT_ID }}/g" index.html
          sed -i "s/REPLACE_WITH_FIREBASE_STORAGE_BUCKET/${{ secrets.FIREBASE_STORAGE_BUCKET }}/g" index.html
          sed -i "s/REPLACE_WITH_FIREBASE_MESSAGING_SENDER_ID/${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}/g" index.html
          sed -i "s/REPLACE_WITH_FIREBASE_APP_ID/${{ secrets.FIREBASE_APP_ID }}/g" index.html
          sed -i "s/REPLACE_WITH_GEMINI_API_KEY/${{ secrets.GEMINI_API_KEY }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
