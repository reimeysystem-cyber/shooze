<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Finder & Collector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #authOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 50; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="authOverlay">
        <div class="text-center">
            <div class="spinner w-12 h-12 border-t-blue-500 mb-4 mx-auto"></div>
            <p class="text-slate-400 animate-pulse">データを読み込み中...</p>
        </div>
    </div>

    <header class="py-8 px-4 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            SHOE FINDER PRO
        </h1>
        <p class="text-slate-400 mt-2">最新の価格を検索して自分だけのリストを保存</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <section class="glass-card rounded-2xl p-6 mb-10 shadow-xl">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow relative">
                    <input type="text" id="searchInput" placeholder="靴のモデル名やブランドを入力 (例: Nike Air Max 95)" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg pl-4 pr-12 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="searchShoes()" id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-all flex items-center justify-center min-w-[140px]">
                    <span id="btnText">情報を検索</span>
                    <div id="loadingSpinner" class="spinner hidden ml-2"></div>
                </button>
            </div>
            <div class="flex justify-between items-center mt-2">
                <p class="text-xs text-slate-500">※実際の価格と異なる場合があります。</p>
                <div id="userStatus" class="text-[10px] text-slate-600">ID: Loading...</div>
            </div>
        </section>

        <div id="resultsSection" class="hidden mb-12">
            <div class="flex justify-between items-end mb-4 px-2">
                <h2 class="text-xl font-bold text-blue-300">検索結果</h2>
                <div class="text-right">
                    <span class="text-slate-400 text-sm">市場平均価格目安:</span>
                    <span id="avgPrice" class="text-emerald-400 font-bold ml-1">---</span>
                </div>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <hr class="border-slate-800 mb-12">

        <section>
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-bold flex items-center">
                    <span class="mr-2">⭐</span> 自分のピックアップリスト
                </h2>
                <div class="text-sm text-slate-400" id="collectionCount">0 items</div>
            </div>
            <div id="collectionGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <div id="emptyCollection" class="text-center py-10 text-slate-500">
                まだピックアップした靴はありません。
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "__FIREBASE_API_KEY__",
            authDomain: "__FIREBASE_AUTH_DOMAIN__",
            projectId: "__FIREBASE_PROJECT_ID__",
            storageBucket: "__FIREBASE_STORAGE_BUCKET__",
            messagingSenderId: "__FIREBASE_MESSAGING_SENDER_ID__",
            appId: "__FIREBASE_APP_ID__"
        };
        const geminiApiKey = "__GEMINI_API_KEY__";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "shoe-collector-v2";

        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('authOverlay').style.display = 'none', 500);
                document.getElementById('userStatus').innerText = `User ID: ${user.uid.substring(0, 8)}...`;
                setupCollectionListener(user.uid);
            }
        });

        signInAnonymously(auth).catch(e => console.error("Auth error:", e));

        function setupCollectionListener(uid) {
            const collectionRef = collection(db, 'artifacts', appId, 'users', uid, 'shoes');
            onSnapshot(collectionRef, (snapshot) => {
                const shoes = [];
                snapshot.forEach(doc => shoes.push({ id: doc.id, ...doc.data() }));
                shoes.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                updateCollectionUI(shoes);
            }, (error) => console.error("Sync error:", error));
        }

        window.addToCollection = async (item) => {
            if (!currentUser) return;
            try {
                const collectionRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes');
                await addDoc(collectionRef, { ...item, createdAt: serverTimestamp() });
            } catch (error) { console.error("Save error:", error); }
        };

        window.removeFromCollection = async (docId) => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes', docId);
                await deleteDoc(docRef);
            } catch (error) { console.error("Delete error:", error); }
        };

        window.searchShoes = async () => {
            const queryVal = document.getElementById('searchInput').value;
            if (!queryVal) return;
            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const resultsSection = document.getElementById('resultsSection');

            btn.disabled = true;
            btnText.innerText = '検索中...';
            spinner.classList.remove('hidden');

            try {
                const prompt = `Search for market data of "${queryVal}" in Japan. Respond strictly in the following JSON format: {"results": [{"name", "amazon_price", "image_url", "amazon_url"}], "average_market_price": number}`;
                
                // 修正ポイント: Google検索ツールを使用する場合、具体的なバージョン番号付きのモデル名が必要です
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash-001:generateContent?key=${geminiApiKey}`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.2
                        }
                    })
                });
                
                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error?.message || "通信エラーが発生しました。");
                }
                
                const data = await response.json();
                if (!data.candidates || !data.candidates[0].content) throw new Error("AIから有効な回答が得られませんでした。");
                
                const resultData = JSON.parse(data.candidates[0].content.parts[0].text);
                displaySearchResults(resultData);
                resultsSection.classList.remove('hidden');
            } catch (error) {
                console.error("Search Error:", error);
                alert("検索中にエラーが発生しました: " + error.message);
            } finally {
                btn.disabled = false;
                btnText.innerText = '情報を検索';
                spinner.classList.add('hidden');
            }
        };

        function displaySearchResults(data) {
            const grid = document.getElementById('resultsGrid');
            const avgDisplay = document.getElementById('avgPrice');
            grid.innerHTML = '';
            avgDisplay.innerText = `¥${Number(data.average_market_price || 0).toLocaleString()}`;
            (data.results || []).forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl overflow-hidden shadow-lg border-blue-500/30 border flex flex-col transition-transform hover:scale-[1.02]';
                const safeUrl = item.amazon_url?.includes('amazon') ? item.amazon_url : `https://www.amazon.co.jp/s?k=${encodeURIComponent(item.name)}`;
                card.innerHTML = `
                    <div class="h-48 bg-slate-900 overflow-hidden relative"><img src="${item.image_url}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400';"></div>
                    <div class="p-4 flex-grow flex flex-col">
                        <h4 class="font-bold text-white text-sm line-clamp-2 mb-2">${item.name}</h4>
                        <p class="text-emerald-400 font-bold mb-4 mt-auto">¥${Number(item.amazon_price).toLocaleString()}</p>
                        <div class="flex gap-2">
                            <button onclick='addToCollection(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="flex-grow bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2 rounded transition-all">ピックアップ</button>
                            <a href="${safeUrl}" target="_blank" class="bg-orange-500 p-2 rounded hover:bg-orange-400 w-10 flex items-center justify-center text-white text-xs font-bold">A</a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateCollectionUI(shoes) {
            const grid = document.getElementById('collectionGrid');
            const empty = document.getElementById('emptyCollection');
            const countDisplay = document.getElementById('collectionCount');
            grid.innerHTML = '';
            countDisplay.innerText = `${shoes.length} items`;
            if (shoes.length === 0) { empty.classList.remove('hidden'); return; }
            empty.classList.add('hidden');
            shoes.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl overflow-hidden flex flex-col relative group animate-fade-in';
                card.innerHTML = `
                    <button onclick="removeFromCollection('${item.id}')" class="absolute top-2 right-2 z-10 bg-red-500/80 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-opacity"><svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="6 18L18 6M6 6l12 12"></path></svg></button>
                    <div class="h-32 bg-slate-900"><img src="${item.image_url}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'"></div>
                    <div class="p-3">
                        <p class="text-[10px] text-slate-400 truncate mb-1">${item.name}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-sm font-bold text-emerald-400">¥${Number(item.amazon_price).toLocaleString()}</p>
                            <a href="https://www.amazon.co.jp/s?k=${encodeURIComponent(item.name)}" target="_blank" class="text-slate-500 hover:text-orange-400"><svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg></a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
