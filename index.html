<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Finder Pro - 完全版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; overflow-x: hidden; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #authOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 100; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- 初期読み込みオーバーレイ -->
    <div id="authOverlay">
        <div class="text-center">
            <div class="spinner w-12 h-12 border-t-blue-500 mb-4 mx-auto"></div>
            <p class="text-slate-400 animate-pulse font-medium">システム起動中...</p>
        </div>
    </div>

    <!-- ヘッダー -->
    <header class="py-10 px-4 text-center">
        <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-blue-400 via-indigo-400 to-emerald-400 mb-2">
            SHOE FINDER PRO
        </h1>
        <p class="text-slate-400 text-lg max-w-lg mx-auto">Gemini AI が最新の市場価格と情報を検索し、あなただけのコレクションを構築します。</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <!-- 検索セクション -->
        <section class="glass-card rounded-3xl p-8 mb-12 shadow-2xl border-blue-500/20">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow relative">
                    <input type="text" id="searchInput" placeholder="モデル名や型番を入力 (例: Air Jordan 1 Lost & Found)" 
                        class="w-full bg-slate-900/50 border border-slate-700 rounded-xl pl-5 pr-12 py-4 text-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all placeholder:text-slate-600">
                </div>
                <button onclick="searchShoes()" id="searchBtn"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl transition-all flex items-center justify-center min-w-[180px] shadow-lg shadow-blue-900/20">
                    <span id="btnText">AIで検索開始</span>
                    <div id="loadingSpinner" class="spinner hidden ml-3 w-5 h-5"></div>
                </button>
            </div>
            <div class="flex justify-between items-center mt-4 px-1">
                <p class="text-[11px] text-slate-500 flex items-center italic">
                    <span class="inline-block w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span>
                    Powered by Google Search & Gemini 1.5 Flash (Free Tier)
                </p>
                <div id="userStatus" class="text-[11px] font-mono text-slate-600 uppercase tracking-widest">CONNECTING...</div>
            </div>
        </section>

        <!-- 検索結果セクション -->
        <div id="resultsSection" class="hidden mb-16 animate-fade-in">
            <div class="flex flex-col sm:flex-row justify-between items-baseline mb-6 px-2 gap-2">
                <h2 class="text-2xl font-bold text-white flex items-center">
                    <span class="text-blue-500 mr-3">●</span>検索結果
                </h2>
                <div class="glass-card px-4 py-2 rounded-full border-emerald-500/30">
                    <span class="text-slate-400 text-sm">市場平均価格目安:</span>
                    <span id="avgPrice" class="text-emerald-400 font-bold text-lg ml-2">---</span>
                </div>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <div class="h-px bg-gradient-to-r from-transparent via-slate-800 to-transparent mb-16"></div>

        <!-- コレクションセクション -->
        <section class="animate-fade-in" style="animation-delay: 0.2s;">
            <div class="flex justify-between items-center mb-8 px-2">
                <h2 class="text-3xl font-black text-white flex items-center">
                    <span class="mr-3 text-yellow-500">★</span>MY COLLECTION
                </h2>
                <div class="bg-slate-800/50 text-blue-400 px-4 py-1 rounded-full text-sm font-bold border border-blue-500/20" id="collectionCount">0 ITEMS</div>
            </div>
            <div id="collectionGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            <div id="emptyCollection" class="text-center py-20 glass-card rounded-3xl border-dashed border-2 border-slate-800 text-slate-500">
                <div class="text-4xl mb-4 opacity-20">👟</div>
                <p>まだピックアップした靴はありません。<br>上のフォームから検索して追加してみましょう。</p>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // GitHub Actions 注入用のプレースホルダー
        const firebaseConfig = {
            apiKey: "REPLACE_WITH_FIREBASE_API_KEY",
            authDomain: "REPLACE_WITH_FIREBASE_AUTH_DOMAIN",
            projectId: "REPLACE_WITH_FIREBASE_PROJECT_ID",
            storageBucket: "REPLACE_WITH_FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "REPLACE_WITH_FIREBASE_MESSAGING_SENDER_ID",
            appId: "REPLACE_WITH_FIREBASE_APP_ID"
        };
        const geminiApiKey = "REPLACE_WITH_GEMINI_API_KEY";

        // Firebase 初期化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "shoe-collector-final";

        let currentUser = null;

        // 認証監視
        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('authOverlay').style.display = 'none', 500);
                document.getElementById('userStatus').innerText = `SESSION: ${user.uid.substring(0, 8)}`;
                setupCollectionListener(user.uid);
            }
        });

        const initAuth = async () => {
            try { await signInAnonymously(auth); } catch (e) { console.error("Auth Error", e); }
        };
        initAuth();

        // コレクションのリアルタイム同期
        function setupCollectionListener(uid) {
            const colRef = collection(db, 'artifacts', appId, 'users', uid, 'shoes');
            onSnapshot(colRef, (snap) => {
                const shoes = [];
                snap.forEach(d => shoes.push({ id: d.id, ...d.data() }));
                shoes.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                updateCollectionUI(shoes);
            }, (err) => console.error("Firestore Error", err));
        }

        // 保存処理
        window.addToCollection = async (item) => {
            if (!currentUser) return;
            try {
                const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes');
                await addDoc(colRef, { ...item, createdAt: serverTimestamp() });
            } catch (e) { console.error("Save failed", e); }
        };

        // 削除処理
        window.removeFromCollection = async (docId) => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes', docId);
                await deleteDoc(docRef);
            } catch (e) { console.error("Delete failed", e); }
        };

        // Gemini AI 検索
        window.searchShoes = async () => {
            const queryVal = document.getElementById('searchInput').value;
            if (!queryVal) return;

            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const resultsSection = document.getElementById('resultsSection');

            btn.disabled = true;
            btnText.innerText = 'AIがウェブを検索中...';
            spinner.classList.remove('hidden');

            try {
                // モデルを安定版の 1.5-flash に、Google検索ツールを追加
                const prompt = `今現在の "${queryVal}" の日本国内での市場価格、Amazonや楽天での販売情報、画像URLを調査してください。
                必ず以下のJSON形式でのみ返答してください。余計な説明文は一切含めないでください。
                {"results": [{"name": "正式名称", "amazon_price": 数値, "image_url": "有効な画像URL", "amazon_url": "検索結果URL"}], "average_market_price": 平均価格数値}`;

                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            temperature: 0.7
                        }
                    })
                });

                const data = await response.json();

                if (!data.candidates || !data.candidates[0]) {
                    throw new Error(data.error?.message || "API制限かキーの不備により、AIから応答が得られませんでした。");
                }

                const resultText = data.candidates[0].content.parts[0].text;
                const resultData = JSON.parse(resultText);
                
                displaySearchResults(resultData);
                resultsSection.classList.remove('hidden');
                resultsSection.scrollIntoView({ behavior: 'smooth' });

            } catch (error) {
                console.error("AI Search Error:", error);
                alert(`エラー: ${error.message}\n\nGitHub Secretsの設定と、Gemini APIキーの有効期限を確認してください。`);
            } finally {
                btn.disabled = false;
                btnText.innerText = 'AIで検索開始';
                spinner.classList.add('hidden');
            }
        };

        function displaySearchResults(data) {
            const grid = document.getElementById('resultsGrid');
            const avgDisplay = document.getElementById('avgPrice');
            grid.innerHTML = '';
            
            const avg = data.average_market_price || 0;
            avgDisplay.innerText = avg > 0 ? `¥${Number(avg).toLocaleString()}` : '調査中';

            (data.results || []).slice(0, 6).forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden shadow-xl border-blue-500/20 flex flex-col transition-all hover:scale-[1.03] hover:border-blue-500/50';
                
                const safeUrl = item.amazon_url || `https://www.amazon.co.jp/s?k=${encodeURIComponent(item.name)}`;
                const displayPrice = item.amazon_price > 0 ? `¥${Number(item.amazon_price).toLocaleString()}` : '価格情報なし';

                card.innerHTML = `
                    <div class="h-56 bg-slate-900 overflow-hidden relative group">
                        <img src="${item.image_url}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110" 
                             onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=600&q=80';">
                        <div class="absolute inset-0 bg-gradient-to-t from-slate-900/80 to-transparent opacity-60"></div>
                    </div>
                    <div class="p-5 flex-grow flex flex-col">
                        <h4 class="font-bold text-white text-md line-clamp-2 mb-3 h-12 leading-tight">${item.name}</h4>
                        <p class="text-emerald-400 text-xl font-black mb-5 mt-auto">${displayPrice}</p>
                        <div class="flex gap-2">
                            <button onclick='addToCollection(${JSON.stringify(item).replace(/'/g, "&apos;")})' 
                                class="flex-grow bg-blue-600 hover:bg-blue-500 text-white text-sm font-bold py-3 rounded-xl transition-all shadow-lg shadow-blue-900/30">
                                ピックアップ
                            </button>
                            <a href="${safeUrl}" target="_blank" 
                                class="bg-orange-500 hover:bg-orange-400 w-14 flex items-center justify-center rounded-xl transition-all shadow-lg shadow-orange-900/30 text-white font-bold">
                                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path></svg>
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateCollectionUI(shoes) {
            const grid = document.getElementById('collectionGrid');
            const empty = document.getElementById('emptyCollection');
            const countDisplay = document.getElementById('collectionCount');
            grid.innerHTML = '';
            countDisplay.innerText = `${shoes.length} ITEMS`;
            
            if (shoes.length === 0) {
                empty.classList.remove('hidden');
                return;
            }
            
            empty.classList.add('hidden');
            shoes.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden flex flex-col relative group animate-fade-in border-white/5';
                card.innerHTML = `
                    <button onclick="removeFromCollection('${item.id}')" 
                        class="absolute top-2 right-2 z-20 bg-red-500/90 hover:bg-red-500 p-2 rounded-full opacity-0 group-hover:opacity-100 transition-all transform hover:scale-110">
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="h-36 bg-slate-900 relative">
                        <img src="${item.image_url}" class="w-full h-full object-cover" 
                             onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400';">
                    </div>
                    <div class="p-3 bg-slate-800/30">
                        <p class="text-[10px] font-medium text-slate-400 truncate mb-1 uppercase tracking-tighter">${item.name}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-sm font-black text-emerald-400">¥${Number(item.amazon_price || 0).toLocaleString()}</p>
                            <a href="https://www.amazon.co.jp/s?k=${encodeURIComponent(item.name)}" target="_blank" class="text-slate-500 hover:text-orange-400 transition-colors">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
