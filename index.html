<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Finder Pro - 安定版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #authOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 50; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <div id="authOverlay">
        <div class="text-center">
            <div id="loaderIcon" class="spinner w-12 h-12 border-t-blue-500 mb-4 mx-auto"></div>
            <p id="loaderText" class="text-slate-400 animate-pulse">システム起動中...</p>
        </div>
    </div>

    <header class="py-10 px-4 text-center">
        <h1 class="text-5xl font-black tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-blue-400 via-indigo-400 to-emerald-400 mb-2">
            SHOE FINDER PRO
        </h1>
        <p class="text-slate-400 text-lg">AIによる市場調査 & ピックアップ管理</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        <section class="glass-card rounded-3xl p-8 mb-12 shadow-2xl border-blue-500/20">
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="searchInput" placeholder="靴のモデル名を入力 (例: Air Jordan 1)" 
                    class="flex-grow bg-slate-900/50 border border-slate-700 rounded-xl px-5 py-4 text-lg focus:ring-2 focus:ring-blue-500 outline-none transition-all">
                <button onclick="searchShoes()" id="searchBtn"
                    class="bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-bold py-4 px-10 rounded-xl transition-all flex items-center justify-center min-w-[180px]">
                    <span id="btnText">検索開始</span>
                    <div id="loadingSpinner" class="spinner hidden ml-3 w-5 h-5"></div>
                </button>
            </div>
            <div id="statusInfo" class="text-[10px] text-slate-500 mt-4 tracking-widest uppercase flex justify-between">
                <span>Powered by Gemini 1.5 Flash (Free Tier)</span>
                <span id="quotaTimer" class="text-amber-500 hidden text-right"></span>
            </div>
        </section>

        <div id="resultsSection" class="hidden mb-16 animate-fade-in">
            <div class="flex justify-between items-baseline mb-6 px-2">
                <h2 class="text-2xl font-bold text-white flex items-center"><span class="text-blue-500 mr-3">●</span>検索結果</h2>
                <div class="glass-card px-4 py-2 rounded-full border-emerald-500/30">
                    <span class="text-slate-400 text-sm">平均価格目安:</span>
                    <span id="avgPrice" class="text-emerald-400 font-bold text-lg ml-2">---</span>
                </div>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8"></div>
        </div>

        <section class="animate-fade-in">
            <h2 class="text-3xl font-black text-white mb-8 px-2 flex items-center">
                <span class="mr-3 text-yellow-500">★</span>MY COLLECTION
            </h2>
            <div id="collectionGrid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6"></div>
            <div id="emptyCollection" class="text-center py-20 glass-card rounded-3xl border-dashed border-2 border-slate-800 text-slate-500">
                ピックアップした靴はここに表示されます。
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "REPLACE_WITH_FIREBASE_API_KEY",
            authDomain: "REPLACE_WITH_FIREBASE_AUTH_DOMAIN",
            projectId: "REPLACE_WITH_FIREBASE_PROJECT_ID",
            storageBucket: "REPLACE_WITH_FIREBASE_STORAGE_BUCKET",
            messagingSenderId: "REPLACE_WITH_FIREBASE_MESSAGING_SENDER_ID",
            appId: "REPLACE_WITH_FIREBASE_APP_ID"
        };
        const geminiApiKey = "REPLACE_WITH_GEMINI_API_KEY";

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "shoe-collector-v2";
        let currentUser = null;

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                document.getElementById('authOverlay').style.opacity = '0';
                setTimeout(() => document.getElementById('authOverlay').style.display = 'none', 500);
                setupCollectionListener(user.uid);
            }
        });
        signInAnonymously(auth);

        function setupCollectionListener(uid) {
            const colRef = collection(db, 'artifacts', appId, 'users', uid, 'shoes');
            onSnapshot(colRef, (snap) => {
                const shoes = [];
                snap.forEach(d => shoes.push({ id: d.id, ...d.data() }));
                updateCollectionUI(shoes);
            });
        }

        window.addToCollection = async (item) => {
            if (!currentUser) return;
            const colRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes');
            await addDoc(colRef, { ...item, createdAt: serverTimestamp() });
        };

        window.removeFromCollection = async (id) => {
            const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes', id);
            await deleteDoc(docRef);
        };

        window.searchShoes = async () => {
            const queryVal = document.getElementById('searchInput').value;
            if (!queryVal) return;

            const btn = document.getElementById('searchBtn');
            const spinner = document.getElementById('loadingSpinner');
            const quotaDisplay = document.getElementById('quotaTimer');
            btn.disabled = true; spinner.classList.remove('hidden');
            quotaDisplay.classList.add('hidden');

            try {
                // モデル名を 正しい 'gemini-1.5-flash' に変更
                const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${geminiApiKey}`;
                
                const response = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `調査依頼: "${queryVal}" の日本国内の市場価格と情報を教えてください。JSON形式: {"results": [{"name", "amazon_price", "image_url", "amazon_url"}], "average_market_price": number}` }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { 
                            responseMimeType: "application/json"
                        }
                    })
                });

                const data = await response.json();
                
                if (response.status === 404) {
                    throw new Error("モデルが見つかりませんでした (404)。エンドポイントの設定を確認してください。");
                }
                
                if (data.error) throw new Error(`${data.error.message}`);
                if (!data.candidates || !data.candidates[0].content) throw new Error("AIから有効な回答が得られませんでした。");

                const resultData = JSON.parse(data.candidates[0].content.parts[0].text);
                renderResults(resultData);
            } catch (error) {
                console.error(error);
                if (error.message.includes("429") || error.message.includes("limit")) {
                    quotaDisplay.innerText = "制限超過: 少し待機してください";
                    quotaDisplay.classList.remove('hidden');
                }
                alert("検索エラー: " + error.message);
            } finally {
                btn.disabled = false; spinner.classList.add('hidden');
            }
        };

        function renderResults(data) {
            const grid = document.getElementById('resultsGrid');
            const avgDisplay = document.getElementById('avgPrice');
            grid.innerHTML = '';
            document.getElementById('resultsSection').classList.remove('hidden');
            avgDisplay.innerText = `¥${Number(data.average_market_price || 0).toLocaleString()}`;

            (data.results || []).forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden flex flex-col transition-all hover:scale-105';
                card.innerHTML = `
                    <div class="h-48 bg-slate-900"><img src="${item.image_url}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400';"></div>
                    <div class="p-5 flex-grow">
                        <h4 class="font-bold text-white text-sm line-clamp-2 mb-3">${item.name}</h4>
                        <p class="text-emerald-400 text-xl font-black mb-4">¥${Number(item.amazon_price).toLocaleString()}</p>
                        <button onclick='addToCollection(${JSON.stringify(item).replace(/'/g, "&apos;")})' class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold">ピックアップ</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateCollectionUI(shoes) {
            const grid = document.getElementById('collectionGrid');
            grid.innerHTML = '';
            document.getElementById('emptyCollection').classList.toggle('hidden', shoes.length > 0);
            shoes.forEach(item => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-2xl overflow-hidden relative group';
                card.innerHTML = `
                    <button onclick="removeFromCollection('${item.id}')" class="absolute top-2 right-2 bg-red-500 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all shadow-lg">✕</button>
                    <div class="h-32 bg-slate-900"><img src="${item.image_url}" class="w-full h-full object-cover"></div>
                    <div class="p-3 bg-slate-800/50"><p class="text-[10px] text-slate-400 truncate">${item.name}</p></div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
