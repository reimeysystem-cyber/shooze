<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoe Finder & Collector Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f1f5f9; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .spinner { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        #authOverlay { position: fixed; inset: 0; background: #0f172a; z-index: 50; display: flex; align-items: center; justify-content: center; transition: opacity 0.5s; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- 起動時のローディング画面 -->
    <div id="authOverlay">
        <div class="text-center">
            <div class="spinner w-12 h-12 border-t-blue-500 mb-4 mx-auto"></div>
            <p class="text-slate-400 animate-pulse">データベース接続中...</p>
        </div>
    </div>

    <header class="py-8 px-4 text-center">
        <h1 class="text-4xl font-extrabold tracking-tight text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400">
            SHOE FINDER PRO
        </h1>
        <p class="text-slate-400 mt-2">Amazon価格をリアルタイム検索 & クラウド保存</p>
    </header>

    <main class="max-w-6xl mx-auto px-4">
        
        <!-- 検索セクション -->
        <section class="glass-card rounded-2xl p-6 mb-10 shadow-xl">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-grow relative">
                    <input type="text" id="searchInput" placeholder="靴のモデル名を入力 (例: Nike Air Max 95)" 
                        class="w-full bg-slate-800 border border-slate-700 rounded-lg pl-4 pr-12 py-3 focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <button onclick="searchShoes()" id="searchBtn"
                    class="bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 px-8 rounded-lg transition-all flex items-center justify-center min-w-[140px]">
                    <span id="btnText">検索開始</span>
                    <div id="loadingSpinner" class="spinner hidden ml-2"></div>
                </button>
            </div>
            <div class="flex justify-between items-center mt-3">
                <p class="text-[10px] text-slate-500 uppercase tracking-widest">Powered by Gemini AI & Google Search</p>
                <div id="userStatus" class="text-[10px] text-slate-600 font-mono">Connecting...</div>
            </div>
        </section>

        <!-- 検索結果表示エリア -->
        <div id="resultsSection" class="hidden mb-12">
            <div class="flex justify-between items-end mb-4 px-2">
                <h2 class="text-xl font-bold text-blue-300">最新の検索結果</h2>
                <div class="text-right">
                    <span class="text-slate-400 text-sm">市場平均価格目安:</span>
                    <span id="avgPrice" class="text-emerald-400 font-bold ml-1 text-lg">---</span>
                </div>
            </div>
            <div id="resultsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>

        <hr class="border-slate-800 mb-12">

        <!-- マイ・コレクション（保存リスト） -->
        <section>
            <div class="flex justify-between items-center mb-6 px-2">
                <h2 class="text-2xl font-bold flex items-center">
                    <span class="mr-2">👟</span> ピックアップリスト
                </h2>
                <div class="px-3 py-1 bg-slate-800 rounded-full text-xs text-slate-400" id="collectionCount">0 アイテム</div>
            </div>
            <div id="collectionGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <div id="emptyCollection" class="text-center py-20 bg-slate-800/20 rounded-2xl border border-dashed border-slate-700 text-slate-500">
                まだピックアップした靴はありません。上のフォームから検索して追加しましょう！
            </div>
        </section>

    </main>

    <!-- Firebase SDK (ES Modules) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, deleteDoc, onSnapshot, serverTimestamp, query } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 環境変数からの設定取得
        const firebaseConfig = JSON.parse(__firebase_config);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'shoe-pickup-app-v1';
        const geminiApiKey = ""; // 実行環境から提供されるキーを使用

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;

        // --- 指数バックオフ付きフェッチ関数 (Gemini API用) ---
        async function fetchWithRetry(url, options, retries = 5, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url, options);
                    if (response.ok) return response;
                    if (response.status !== 429 && response.status < 500) throw new Error(`HTTP ${response.status}`);
                } catch (e) {
                    if (i === retries - 1) throw e;
                }
                await new Promise(resolve => setTimeout(resolve, delay * Math.pow(2, i)));
            }
        }

        // --- 認証 & 初期化処理 ---
        const initAuth = async () => {
            try {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth failed:", error);
                document.getElementById('authOverlay').innerHTML = "<div class='text-center p-4'><p class='text-red-400 font-bold'>認証エラー</p><p class='text-slate-500 text-sm mt-2'>Firebaseの設定が正しくありません。</p></div>";
            }
        };

        onAuthStateChanged(auth, (user) => {
            currentUser = user;
            if (user) {
                // ローディングを消す
                const overlay = document.getElementById('authOverlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
                
                document.getElementById('userStatus').innerText = `ID: ${user.uid.substring(0, 10)}`;
                // Firestoreのリスナー起動
                setupCollectionListener(user.uid);
            }
        });

        initAuth();

        // --- データベース(Firestore)操作 ---
        function setupCollectionListener(uid) {
            if (!uid) return;
            // RULE 1: 正確なパス構造を使用
            const collectionRef = collection(db, 'artifacts', appId, 'users', uid, 'shoes');
            
            // RULE 2 & 3: シンプルなクエリで取得し、エラーハンドリングを行う
            onSnapshot(collectionRef, (snapshot) => {
                const shoes = [];
                snapshot.forEach(doc => {
                    shoes.push({ docId: doc.id, ...doc.data() });
                });
                // JS側でソート
                shoes.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                updateCollectionUI(shoes);
            }, (error) => {
                console.error("Firestore error:", error);
            });
        }

        window.addToCollection = async (item) => {
            if (!currentUser) return;
            try {
                const collectionRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes');
                await addDoc(collectionRef, {
                    ...item,
                    createdAt: serverTimestamp()
                });
            } catch (error) {
                console.error("Save failed:", error);
            }
        };

        window.removeFromCollection = async (docId) => {
            if (!currentUser) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'users', currentUser.uid, 'shoes', docId);
                await deleteDoc(docRef);
            } catch (error) {
                console.error("Delete failed:", error);
            }
        };

        // --- AI検索ロジック ---
        window.searchShoes = async () => {
            const queryText = document.getElementById('searchInput').value;
            if (!queryText) return;

            const btn = document.getElementById('searchBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('loadingSpinner');
            const resultsSection = document.getElementById('resultsSection');
            const resultsGrid = document.getElementById('resultsGrid');

            btn.disabled = true;
            btnText.innerText = '検索中...';
            spinner.classList.remove('hidden');

            try {
                const prompt = `Search for the current market information for "${queryText}" in Japan. 
                Return a JSON object including:
                1. "results": An array of 3 specific shoe variants. Each must have "name", "amazon_price" (number in JPY), "image_url", and "amazon_url" (Amazon.co.jp link).
                2. "average_market_price": Average price across major retailers in Japan.`;

                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${geminiApiKey}`;
                
                const response = await fetchWithRetry(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: prompt }] }],
                        tools: [{ "google_search": {} }],
                        generationConfig: { 
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    results: {
                                        type: "ARRAY",
                                        items: {
                                            type: "OBJECT",
                                            properties: {
                                                name: { type: "STRING" },
                                                amazon_price: { type: "NUMBER" },
                                                image_url: { type: "STRING" },
                                                amazon_url: { type: "STRING" }
                                            }
                                        }
                                    },
                                    average_market_price: { type: "NUMBER" }
                                }
                            }
                        }
                    })
                });

                const data = await response.json();
                const resultData = JSON.parse(data.candidates[0].content.parts[0].text);
                
                renderSearchResults(resultData);
                resultsSection.classList.remove('hidden');
                resultsSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

            } catch (error) {
                console.error("Search error:", error);
                alert("情報の取得に失敗しました。時間をおいて再度お試しください。");
            } finally {
                btn.disabled = false;
                btnText.innerText = '検索開始';
                spinner.classList.add('hidden');
            }
        };

        function renderSearchResults(data) {
            const grid = document.getElementById('resultsGrid');
            const avgDisplay = document.getElementById('avgPrice');
            grid.innerHTML = '';

            const items = data.results || [];
            avgDisplay.innerText = `¥${Number(data.average_market_price || 0).toLocaleString()}`;

            items.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl overflow-hidden shadow-lg border-blue-500/30 border flex flex-col animate-fade-in';
                
                const safeAmazonLink = item.amazon_url?.includes('amazon') 
                    ? item.amazon_url 
                    : `https://www.amazon.co.jp/s?k=${encodeURIComponent(item.name)}`;

                card.innerHTML = `
                    <div class="h-48 bg-slate-900 overflow-hidden group">
                        <img src="${item.image_url}" class="w-full h-full object-cover transition-transform group-hover:scale-110" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400';">
                    </div>
                    <div class="p-4 flex-grow flex flex-col">
                        <h4 class="font-bold text-white text-sm line-clamp-2 mb-2 h-10">${item.name}</h4>
                        <div class="mt-auto">
                            <p class="text-xs text-slate-400 mb-1">参考価格</p>
                            <p class="text-emerald-400 font-bold text-lg mb-4">¥${Number(item.amazon_price).toLocaleString()}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='addToCollection(${JSON.stringify(item).replace(/'/g, "&apos;")})' 
                                class="flex-grow bg-blue-600 hover:bg-blue-500 text-white text-xs font-bold py-2.5 rounded-lg transition-all active:scale-95">
                                ピックアップに追加
                            </button>
                            <a href="${safeAmazonLink}" target="_blank" class="bg-orange-500 p-2.5 rounded-lg hover:bg-orange-400 transition-colors w-12 flex items-center justify-center">
                                <span class="text-white text-xs font-black">A</span>
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function updateCollectionUI(shoes) {
            const grid = document.getElementById('collectionGrid');
            const empty = document.getElementById('emptyCollection');
            const countDisplay = document.getElementById('collectionCount');
            grid.innerHTML = '';
            countDisplay.innerText = `${shoes.length} アイテム`;

            if (shoes.length === 0) {
                empty.classList.remove('hidden');
                return;
            }

            empty.classList.add('hidden');
            shoes.forEach((item) => {
                const card = document.createElement('div');
                card.className = 'glass-card rounded-xl overflow-hidden flex flex-col relative group animate-fade-in shadow-md';
                card.innerHTML = `
                    <button onclick="removeFromCollection('${item.docId}')" class="absolute top-2 right-2 z-10 bg-red-500/90 p-1.5 rounded-full opacity-0 group-hover:opacity-100 transition-all hover:bg-red-600">
                        <svg class="w-3.5 h-3.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>
                    </button>
                    <div class="h-32 bg-slate-900 border-b border-slate-700/50">
                        <img src="${item.image_url}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400'">
                    </div>
                    <div class="p-3">
                        <p class="text-[10px] text-slate-400 truncate mb-1" title="${item.name}">${item.name}</p>
                        <div class="flex justify-between items-center">
                            <p class="text-sm font-bold text-emerald-400">¥${Number(item.amazon_price).toLocaleString()}</p>
                            <a href="https://www.amazon.co.jp/s?k=${encodeURIComponent(item.name)}" target="_blank" class="text-slate-600 hover:text-orange-400 transition-colors">
                                <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/></svg>
                            </a>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
    </script>
</body>
</html>
